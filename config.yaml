# Application
ui:
  page_title: "WASDE Commodity Summarizer"
  max_file_size_mb: 50

# LLM provider: "openai" | "groq" | "gemini"
# - openai: needs OPENAI_API_KEY (paid quota)
# - groq: free cloud, get key at https://console.groq.com/keys
# - gemini: free tier, get key at https://aistudio.google.com/app/apikey
llm:
  provider: "groq"
  groq:
    base_url: "https://api.groq.com/openai/v1"
    model: "llama-3.1-8b-instant"
  gemini:
    model: "gemini-1.5-flash"

# OpenAI API (key from OPENAI_API_KEY env var) - used when llm.provider is "openai"
openai:
  model: "gpt-4o-mini"
  max_tokens: 2048
  temperature: 0.3
  # Max characters of commentary sent to LLM (avoids 413 on Groq etc.). Truncate if longer.
  max_commentary_chars: 12000

# PDF parsing: section headers used to split commentary by commodity
pdf:
  commodity_headers:
    - Wheat
    - Coarse Grains
    - Rice
    - Oilseeds
    - Cotton
    - Sugar
    - Livestock
    - Poultry
    - Dairy

# Retrieval Pipeline Settings
retrieval:
  chunking:
    strategy: "commodity_aware"  # options: "commodity_aware", "standard"
    chunk_size: 600
    overlap: 100
  embedding:
    provider: "sentence-transformers" # options: "sentence-transformers", "openai"
    openai_model: "text-embedding-3-small"
  vector_store:
    provider: "lancedb" # options: "lancedb"
    path: ".lancedb"
    top_k: 5

# Optional: Microsoft Agent Framework (MAF)
use_maf_retrieval: false

# Use Microsoft Agent Framework (MAF) for search: agent performs retrieval via LanceDB tool.
# Requires OPENAI_API_KEY (MAF uses OpenAI for the agent). If false, search uses direct LLM (Groq/Gemini/OpenAI).
use_maf_retrieval: false
