# Run WASDE Summarizer with Docker Compose.
# Create .env with your API key (e.g. GROQ_API_KEY=...) before running.
services:
  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    # Optional: override provider or keys via environment
    # environment:
    #   - GROQ_API_KEY=${GROQ_API_KEY}
    #   - LLM_PROVIDER=groq
